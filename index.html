<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>晟格瑞能源 | 雲端戰情室</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23000000'/%3E%3Cpath d='M50 10A40 40 0 1 0 90 50H50v-15h25a25 25 0 1 1-25-25 25 25 0 0 1 18 8l10-12A40 40 0 0 0 50 10z' fill='%23C5E1A5'/%3E%3C/svg%3E">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: #f8fafc; font-family: system-ui, sans-serif; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="bg-slate-800 p-8 rounded-3xl shadow-2xl border border-slate-700 w-full max-w-sm text-center transform transition-all hover:scale-[1.02]">
        <div class="w-20 h-20 mx-auto bg-black rounded-2xl flex items-center justify-center mb-6 shadow-lg border border-slate-700">
            <svg width="45" height="45" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <path d="M50 10A40 40 0 1 0 90 50H50v-15h25a25 25 0 1 1-25-25 25 25 0 0 1 18 8l10-12A40 40 0 0 0 50 10z" fill="#C5E1A5"/>
            </svg>
        </div>
        <h1 class="text-2xl font-black mb-2 text-white tracking-wider">晟格瑞雲端戰情室</h1>
        <p class="text-slate-400 text-[13px] font-bold mb-8">請輸入設備授權碼 (MAC) 以連線</p>
        
        <input type="text" id="mac-input" placeholder="例如: 8C4F003014A0" class="w-full bg-slate-900 border border-slate-600 rounded-xl px-4 py-3.5 mb-6 text-center text-lg font-mono text-blue-400 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/50 transition-all uppercase placeholder:text-slate-600 placeholder:text-sm shadow-inner">
        
        <button onclick="login()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-3.5 rounded-xl shadow-lg shadow-blue-500/30 active:scale-95 transition-all flex justify-center items-center gap-2 text-[15px]">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 3a1 1 0 00-1 1v12a1 1 0 102 0V4a1 1 0 00-1-1zm10.293 9.293a1 1 0 001.414 1.414l3-3a1 1 0 000-1.414l-3-3a1 1 0 10-1.414 1.414L14.586 9H7a1 1 0 100 2h7.586l-1.293 1.293z" clip-rule="evenodd" /></svg>
            安全連線
        </button>
        <div id="error-msg" class="text-rose-500 text-[13px] font-bold mt-4 opacity-0 transition-opacity">請輸入有效的 12 位設備碼</div>
    </div>

    <script>
        const savedMac = localStorage.getItem('sgre_device_id');
        if (savedMac) { document.getElementById('mac-input').value = savedMac; }

        function login() {
            let mac = document.getElementById('mac-input').value.toUpperCase().replace(/[^A-F0-9]/g, '');
            let errorMsg = document.getElementById('error-msg');
            
            if (mac.length !== 12) {
                errorMsg.style.opacity = '1';
                setTimeout(() => errorMsg.style.opacity = '0', 3000);
                return;
            }

            localStorage.setItem('sgre_device_id', mac);
            
            if (window.innerWidth <= 768) {
                window.location.href = 'mobile.html';
            } else {
                window.location.href = 'desktop.html';
            }
        }

        document.getElementById('mac-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>
