<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>晟格瑞能源雲端入口</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen">
    <div id="login-box" class="bg-slate-800 p-8 rounded-2xl shadow-2xl border border-slate-700 w-[90%] max-w-sm text-center">
        <h1 class="text-white text-2xl font-black mb-6">🔗 雲端監控入口</h1>
        <input type="text" id="mac-input" placeholder="請輸入設備 MAC (如: 8C4F...)" class="w-full p-3 mb-4 rounded-xl bg-slate-900 text-white border border-slate-600 focus:border-blue-500 outline-none">
        <button onclick="connect()" class="w-full py-3 bg-blue-600 text-white font-black rounded-xl hover:bg-blue-500">連線設備</button>
    </div>

    <script>
        const mac = localStorage.getItem('sgre_device_id');
        if (mac) {
            document.getElementById('mac-input').value = mac;
            connect();
        }

        function connect() {
            const deviceID = document.getElementById('mac-input').value.toUpperCase().trim().replace(/:/g, "");
            localStorage.setItem('sgre_device_id', deviceID);
            
            // 隱藏登入頁，準備加載 UI
            document.getElementById('login-box').classList.add('hidden');
            
            // 這裡載入邏輯：判斷螢幕寬度，動態載入 Mobile 或 Desktop 的 HTML 模板內容
            const isMobile = window.innerWidth < 768;
            loadApp(isMobile, deviceID);
        }

        function loadApp(isMobile, deviceID) {
            // 在此處插入您原本在 ui_mobile.h 或 ui_desktop.h 裡的 HTML 與 Script
            // 並將 MQTT 的 Client 宣告掛載上去即可！
            console.log("連線設備:", deviceID, isMobile ? "手機版" : "電腦版");
            // ... 實作掛載邏輯
        }
    </script>
</body>
</html>
